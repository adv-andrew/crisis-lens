<html lang="en">

<script src="https://api.mapbox.com/mapbox-gl-js/v3.9.4/mapbox-gl.js"></script>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

  :root {
    --bg-primary: #0a0a0f;
    --glass-bg: rgba(12, 14, 24, 0.75);
    --glass-border: rgba(255, 255, 255, 0.1);
    --glass-highlight: rgba(255, 255, 255, 0.05);
    --text-primary: #f0f0f5;
    --text-secondary: #8a8a9a;
    --accent-red: #ff4466;
    --accent-orange: #ff8844;
    --accent-yellow: #eab308;
    --accent-green: #22c55e;
    --accent-blue: #3b82f6;
    --accent-purple: #8b5cf6;
    --accent-cyan: #06b6d4;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    overflow: hidden;
    height: 100vh;
    width: 100vw;
  }

  #map { position: absolute; inset: 0; width: 100%; height: 100%; }

  .glass {
    background: var(--glass-bg);
    backdrop-filter: blur(24px) saturate(140%);
    -webkit-backdrop-filter: blur(24px) saturate(140%);
    border: 1px solid var(--glass-border);
    box-shadow: 0 8px 32px rgba(0,0,0,0.4), inset 0 1px 0 var(--glass-highlight);
  }

  /* ── Logo Badge ── */
  .logo-badge {
    position: fixed; top: 16px; left: 16px; z-index: 50;
    display: flex; align-items: center; gap: 10px;
    padding: 10px 18px; border-radius: 16px;
  }
  .logo-badge .logo-icon {
    width: 28px; height: 28px; border-radius: 8px;
    background: linear-gradient(135deg, var(--accent-red), var(--accent-orange));
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 800;
  }
  .logo-badge .logo-text {
    font-size: 15px; font-weight: 700; letter-spacing: -0.3px;
  }
  .logo-badge .logo-sub {
    font-size: 10px; color: var(--text-secondary); font-weight: 500;
    letter-spacing: 1.5px; text-transform: uppercase;
  }

  /* ── Coordinates Island ── */
  .coords-island {
    position: fixed; top: 72px; left: 16px; z-index: 40;
    padding: 8px 14px; border-radius: 12px;
    font-size: 11px; font-family: 'SF Mono', 'Fira Code', monospace;
    color: var(--text-secondary); display: flex; gap: 14px;
  }
  .coords-island span { color: var(--text-primary); font-weight: 500; }

  /* ── Left Sidebar ── */
  .sidebar {
    position: fixed; top: 110px; left: 16px; bottom: 16px; z-index: 30;
    width: 340px; border-radius: 16px; display: flex; flex-direction: column;
    overflow: hidden;
  }
  .sidebar-header {
    padding: 20px 20px 16px; border-bottom: 1px solid var(--glass-border);
  }
  .sidebar-header h2 {
    font-size: 14px; font-weight: 700; letter-spacing: -0.2px;
    display: flex; align-items: center; gap: 8px;
  }
  .sidebar-header .badge {
    font-size: 10px; padding: 2px 8px; border-radius: 99px;
    background: var(--accent-red); color: #fff; font-weight: 600;
  }

  /* ── Controls Row ── */
  .controls-row {
    padding: 12px 20px; border-bottom: 1px solid var(--glass-border);
    display: flex; gap: 6px; flex-wrap: wrap;
  }
  .ctrl-btn {
    padding: 6px 12px; border-radius: 8px; border: 1px solid var(--glass-border);
    background: rgba(255,255,255,0.04); color: var(--text-secondary);
    font-size: 11px; font-weight: 500; cursor: pointer; transition: all 0.2s;
    font-family: inherit;
  }
  .ctrl-btn:hover { background: rgba(255,255,255,0.08); color: var(--text-primary); }
  .ctrl-btn.active { background: rgba(255,68,102,0.15); color: var(--accent-red); border-color: rgba(255,68,102,0.3); }

  .layer-row {
    padding: 8px 20px; border-bottom: 1px solid var(--glass-border);
    display: flex; gap: 6px;
  }
  .layer-btn {
    flex: 1; padding: 6px 8px; border-radius: 8px; border: 1px solid var(--glass-border);
    background: rgba(255,255,255,0.03); color: var(--text-secondary);
    font-size: 10px; font-weight: 500; cursor: pointer; transition: all 0.2s;
    text-align: center; font-family: inherit;
  }
  .layer-btn:hover { background: rgba(255,255,255,0.06); }
  .layer-btn.active { background: rgba(59,130,246,0.15); color: var(--accent-blue); border-color: rgba(59,130,246,0.3); }

  /* ── Crisis List ── */
  .crisis-list {
    flex: 1; overflow-y: auto; padding: 8px 12px;
  }
  .crisis-list::-webkit-scrollbar { width: 4px; }
  .crisis-list::-webkit-scrollbar-track { background: transparent; }
  .crisis-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }
  .crisis-list::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

  .crisis-item {
    padding: 12px 14px; border-radius: 12px; margin-bottom: 4px;
    cursor: pointer; transition: all 0.2s; border: 1px solid transparent;
  }
  .crisis-item:hover { background: rgba(255,255,255,0.04); border-color: var(--glass-border); }
  .crisis-item.selected { background: rgba(255,68,102,0.08); border-color: rgba(255,68,102,0.2); }

  .crisis-item .ci-top {
    display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px;
  }
  .crisis-item .ci-name {
    font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 6px;
  }
  .crisis-item .ci-rank {
    font-size: 10px; color: var(--accent-red); font-weight: 700;
    background: rgba(255,68,102,0.12); padding: 1px 6px; border-radius: 6px;
  }
  .crisis-item .ci-oci {
    font-size: 20px; font-weight: 800; letter-spacing: -1px;
  }
  .crisis-item .ci-bar {
    height: 3px; border-radius: 3px; background: rgba(255,255,255,0.06);
    margin-top: 6px; overflow: hidden;
  }
  .crisis-item .ci-bar-fill { height: 100%; border-radius: 3px; transition: width 0.5s; }
  .crisis-item .ci-meta {
    display: flex; gap: 10px; margin-top: 6px; font-size: 10px; color: var(--text-secondary);
  }

  /* ── Right Detail Panel ── */
  .detail-panel {
    position: fixed; top: 16px; right: 16px; bottom: 16px; z-index: 30;
    width: 380px; border-radius: 16px; display: flex; flex-direction: column;
    overflow: hidden; transform: translateX(420px); transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .detail-panel.open { transform: translateX(0); }

  .detail-header {
    padding: 20px; border-bottom: 1px solid var(--glass-border);
    display: flex; justify-content: space-between; align-items: flex-start;
  }
  .detail-header h3 { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
  .detail-header .close-btn {
    width: 28px; height: 28px; border-radius: 8px; border: 1px solid var(--glass-border);
    background: rgba(255,255,255,0.04); color: var(--text-secondary);
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    font-size: 14px; transition: all 0.2s; font-family: inherit;
  }
  .detail-header .close-btn:hover { background: rgba(255,255,255,0.1); color: var(--text-primary); }

  .detail-body {
    flex: 1; overflow-y: auto; padding: 16px 20px;
  }
  .detail-body::-webkit-scrollbar { width: 4px; }
  .detail-body::-webkit-scrollbar-track { background: transparent; }
  .detail-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

  /* ── KPI Cards ── */
  .kpi-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px;
  }
  .kpi-card {
    padding: 12px; border-radius: 12px; border: 1px solid var(--glass-border);
    background: rgba(255,255,255,0.02);
  }
  .kpi-card .kpi-label {
    font-size: 10px; color: var(--text-secondary); font-weight: 500;
    text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 4px;
  }
  .kpi-card .kpi-value {
    font-size: 22px; font-weight: 800; letter-spacing: -1px;
  }
  .kpi-card .kpi-sub {
    font-size: 10px; color: var(--text-secondary); margin-top: 2px;
  }

  /* ── OCI Decomposition ── */
  .decomp-section { margin-bottom: 20px; }
  .decomp-section h4 {
    font-size: 11px; font-weight: 600; color: var(--text-secondary);
    text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 10px;
  }
  .decomp-bar {
    display: flex; align-items: center; gap: 10px; margin-bottom: 8px;
  }
  .decomp-bar .db-label {
    font-size: 11px; font-weight: 500; width: 100px; flex-shrink: 0;
  }
  .decomp-bar .db-track {
    flex: 1; height: 8px; border-radius: 8px; background: rgba(255,255,255,0.06);
    overflow: hidden;
  }
  .decomp-bar .db-fill {
    height: 100%; border-radius: 8px; transition: width 0.6s ease;
  }
  .decomp-bar .db-val {
    font-size: 11px; font-weight: 700; width: 42px; text-align: right; flex-shrink: 0;
  }

  /* ── Chart container ── */
  .chart-container {
    margin-bottom: 20px; padding: 14px; border-radius: 12px;
    border: 1px solid var(--glass-border); background: rgba(255,255,255,0.02);
  }
  .chart-container h4 {
    font-size: 11px; font-weight: 600; color: var(--text-secondary);
    text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 10px;
  }
  .chart-container canvas { max-height: 200px; }

  /* ── Bottom Stats Bar ── */
  .stats-bar {
    position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%); z-index: 40;
    padding: 10px 24px; border-radius: 14px; display: flex; gap: 28px;
    font-size: 12px;
  }
  .stats-bar .stat { display: flex; flex-direction: column; align-items: center; }
  .stats-bar .stat-val { font-size: 16px; font-weight: 800; letter-spacing: -0.5px; }
  .stats-bar .stat-label { font-size: 9px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px; font-weight: 500; }

  /* ── Legend ── */
  .legend {
    position: fixed; bottom: 70px; left: 50%; transform: translateX(-50%); z-index: 40;
    padding: 8px 16px; border-radius: 10px; display: flex; align-items: center; gap: 4px;
    font-size: 10px; color: var(--text-secondary);
  }
  .legend .lg-block {
    width: 24px; height: 10px; border-radius: 2px;
  }
  .legend .lg-label { margin: 0 6px 0 2px; }

  /* ── Mapbox Overrides ── */
  .mapboxgl-popup-content {
    background: rgba(12, 14, 24, 0.9) !important;
    backdrop-filter: blur(20px) !important;
    border: 1px solid rgba(255,255,255,0.12) !important;
    border-radius: 12px !important;
    color: #f0f0f5 !important;
    padding: 14px 16px !important;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5) !important;
    min-width: 220px;
  }
  .mapboxgl-popup-tip { border-top-color: rgba(12, 14, 24, 0.9) !important; }
  .mapboxgl-popup-close-button {
    color: rgba(255,255,255,0.5) !important; font-size: 18px !important;
    right: 8px !important; top: 6px !important;
  }
  .mapboxgl-popup-close-button:hover { color: #fff !important; background: none !important; }
  .mapboxgl-ctrl-logo, .mapboxgl-ctrl-attrib { opacity: 0.3; }

  /* ── Pulse animation for top crisis ── */
  @keyframes pulse-dot { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  .pulse { animation: pulse-dot 2s ease-in-out infinite; }

  /* ── Loading ── */
  .loading-overlay {
    position: fixed; inset: 0; z-index: 100; background: var(--bg-primary);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    transition: opacity 0.6s; pointer-events: none;
  }
  .loading-overlay.hidden { opacity: 0; }
  .loading-spinner {
    width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.1);
    border-top-color: var(--accent-red); border-radius: 50%;
    animation: spin 0.8s linear infinite; margin-bottom: 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 13px; color: var(--text-secondary); font-weight: 500; }
</style>
</head>

// ═══════════════════════════════════════════════════════════════
let selectedYear = 2026;
let selectedLayer = 'oci';
let selectedCountry = null;
let fundingChart = null;
let decompChart = null;

function getYearData(year) {
  return OCI_DATA.filter(d => d.year === year).sort((a,b) => a.rank - b.rank);
}

function getCountryHistory(iso) {
  return OCI_DATA.filter(d => d.iso === iso).sort((a,b) => a.year - b.year);
}

function getLayerValue(d) {
  if (selectedLayer === 'oci') return d.oci;
  if (selectedLayer === 'gap') return d.gap;
  if (selectedLayer === 'pin') return Math.min(d.pin_norm * 1.5, 1.0);
  if (selectedLayer === 'media') return d.media;
  return d.oci;
}

function getLayerLabel() {
  const labels = { oci:'OCI Score', gap:'Funding Gap', pin:'People in Need', media:'Media Neglect' };
  return labels[selectedLayer] || 'OCI Score';
}

function valToColor(v) {
  // 0→green, 0.5→yellow, 1→red
  if (v <= 0.2) return '#22c55e';
  if (v <= 0.4) return '#84cc16';
  if (v <= 0.55) return '#eab308';
  if (v <= 0.7) return '#f97316';
  if (v <= 0.85) return '#ef4444';
  return '#dc2626';
}

function fmtM(v) { return v >= 1000 ? (v/1000).toFixed(1)+'B' : v.toFixed(0)+'M'; }
function fmtK(v) { return v >= 1000 ? (v/1000).toFixed(1)+'M' : v.toFixed(0)+'K'; }
function fmtPct(v) { return (v*100).toFixed(1)+'%'; }

// ═══════════════════════════════════════════════════════════════
// MAP UPDATE
// ═══════════════════════════════════════════════════════════════
function updateMap() {
  const data = getYearData(selectedYear);
  const isos = data.map(d => d.iso);

  // Build color expression for choropleth
  const colorExpr = ['match', ['get', 'iso_3166_1_alpha_3']];
  data.forEach(d => {
    colorExpr.push(d.iso, valToColor(getLayerValue(d)));
  });
  colorExpr.push('rgba(0,0,0,0)');

  // Build opacity expression
  const opacityExpr = ['match', ['get', 'iso_3166_1_alpha_3']];
  data.forEach(d => {
    const v = getLayerValue(d);
    opacityExpr.push(d.iso, 0.15 + v * 0.45);
  });
  opacityExpr.push(0);

  map.setFilter('crisis-choropleth', ['in', 'iso_3166_1_alpha_3', ...isos]);
  map.setPaintProperty('crisis-choropleth', 'fill-color', colorExpr);
  map.setPaintProperty('crisis-choropleth', 'fill-opacity', opacityExpr);
  map.setFilter('crisis-outline', ['in', 'iso_3166_1_alpha_3', ...isos]);

  // Update markers
  const features = data.map(d => ({
    type: 'Feature',
    geometry: { type: 'Point', coordinates: COUNTRY_CENTERS[d.iso] || [0,0] },
    properties: { iso: d.iso, name: d.name, oci: d.oci, rank: d.rank, gap: d.gap, pin_k: d.pin_k, media: d.media, color: valToColor(getLayerValue(d)) }
  }));
  map.getSource('crisis-points').setData({ type: 'FeatureCollection', features });

  // Update legend label
  document.getElementById('legend-label').textContent = '— ' + getLayerLabel();
}

  list.innerHTML = data.map(d => {
    const v = getLayerValue(d);
    const color = valToColor(v);
    const isSelected = selectedCountry === d.iso;
    return `
      <div class="crisis-item ${isSelected ? 'selected' : ''}" data-iso="${d.iso}">
        <div class="ci-top">
          <div class="ci-name">
            <span class="ci-rank">#${d.rank}</span>
            ${d.name}
          </div>
          <div class="ci-oci" style="color:${color}">${d.oci.toFixed(3)}</div>
        </div>
        <div class="ci-bar"><div class="ci-bar-fill" style="width:${v*100}%;background:${color}"></div></div>
        <div class="ci-meta">
          <span>Gap ${fmtPct(d.gap)}</span>
          <span>PIN ${fmtK(d.pin_k)}</span>
          <span>Sev ${d.severity}/5</span>
        </div>
      </div>
    `;
  }).join('');

  // Click handlers
  list.querySelectorAll('.crisis-item').forEach(el => {
    el.addEventListener('click', () => selectCountry(el.dataset.iso));
  });
}

// ═══════════════════════════════════════════════════════════════
// COUNTRY SELECTION + DETAIL PANEL
// ═══════════════════════════════════════════════════════════════
function selectCountry(iso) {
  selectedCountry = iso;

  // Highlight on map
  map.setFilter('crisis-selected', ['==', 'iso_3166_1_alpha_3', iso]);

  // Fly to
  const center = COUNTRY_CENTERS[iso];
  if (center) map.flyTo({ center, zoom: 4.5, duration: 1200 });

  // Update sidebar selection
  document.querySelectorAll('.crisis-item').forEach(el => {
    el.classList.toggle('selected', el.dataset.iso === iso);
  });

  // Populate detail panel
  const d = OCI_DATA.find(r => r.iso === iso && r.year === selectedYear);
  if (!d) return;

  const panel = document.getElementById('detail-panel');
  document.getElementById('detail-country').textContent = d.name;
  document.getElementById('detail-plan').textContent = d.plan + ' — Rank #' + d.rank;

  const body = document.getElementById('detail-body');
  body.innerHTML = `
    <!-- KPI Cards -->
    <div class="kpi-grid">
      <div class="kpi-card">
        <div class="kpi-label">OCI Score</div>
        <div class="kpi-value" style="color:${valToColor(d.oci)}">${d.oci.toFixed(3)}</div>
        <div class="kpi-sub">Rank #${d.rank} of 65</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Funding Gap</div>
        <div class="kpi-value" style="color:${valToColor(d.gap)}">${fmtPct(d.gap)}</div>
        <div class="kpi-sub">$${fmtM(d.fund)} of $${fmtM(d.req)}</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">People in Need</div>
        <div class="kpi-value" style="color:var(--accent-yellow)">${fmtK(d.pin_k)}</div>
        <div class="kpi-sub">${fmtPct(d.pin_norm)} of population</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Media Neglect</div>
        <div class="kpi-value" style="color:var(--accent-purple)">${(d.media*100).toFixed(0)}%</div>
        <div class="kpi-sub">OCHA Severity ${d.severity}/5</div>
      </div>
    </div>

    <!-- OCI Decomposition -->
    <div class="decomp-section">
      <h4>OCI Component Decomposition</h4>
      <div class="decomp-bar">
        <div class="db-label">Severity</div>
        <div class="db-track"><div class="db-fill" style="width:${d.pin_norm*100}%;background:var(--accent-red)"></div></div>
        <div class="db-val">${d.pin_norm.toFixed(2)}</div>
      </div>
      <div class="decomp-bar">
        <div class="db-label">Sev. Weight</div>
        <div class="db-track"><div class="db-fill" style="width:${d.sev*100}%;background:var(--accent-orange)"></div></div>
        <div class="db-val">${d.sev.toFixed(2)}</div>
      </div>
      <div class="decomp-bar">
        <div class="db-label">Funding Gap</div>
        <div class="db-track"><div class="db-fill" style="width:${d.gap*100}%;background:var(--accent-yellow)"></div></div>
        <div class="db-val">${fmtPct(d.gap)}</div>
      </div>
      <div class="decomp-bar">
        <div class="db-label">Media Neglect</div>
        <div class="db-track"><div class="db-fill" style="width:${d.media*100}%;background:var(--accent-purple)"></div></div>
        <div class="db-val">${(d.media*100).toFixed(0)}%</div>
      </div>
    </div>

    <!-- Funding History Chart -->
    <div class="chart-container">
      <h4>Funding Over Time ($M)</h4>
      <canvas id="funding-chart"></canvas>
    </div>

    <!-- OCI Trend Chart -->
    <div class="chart-container">
      <h4>OCI Score Trend</h4>
      <canvas id="oci-trend-chart"></canvas>
    </div>

    <!-- Funding Breakdown Bar -->
    <div class="decomp-section">
      <h4>Funding Breakdown</h4>
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
        <div style="flex:1;height:20px;border-radius:8px;overflow:hidden;display:flex">
          <div style="width:${(1-d.gap)*100}%;background:var(--accent-green);transition:width 0.6s"></div>
          <div style="flex:1;background:rgba(255,68,102,0.3)"></div>
        </div>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--text-secondary)">
        <span style="color:var(--accent-green)">Funded: $${fmtM(d.fund)}</span>
        <span style="color:var(--accent-red)">Gap: $${fmtM(d.req - d.fund)}</span>
      </div>
    </div>

    <!-- Formula -->
    <div style="margin-top:16px;padding:12px;border-radius:10px;border:1px solid var(--glass-border);background:rgba(255,255,255,0.02)">
      <div style="font-size:10px;color:var(--text-secondary);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.8px;font-weight:600">OCI Formula</div>
      <div style="font-size:11px;font-family:'SF Mono','Fira Code',monospace;color:var(--text-primary);line-height:1.6">
        OCI = (PIN_norm &times; Sev &times; Gap) &times; (1 + Media &times; 0.2)<br>
        <span style="color:var(--text-secondary)">=</span> (${d.pin_norm.toFixed(3)} &times; ${d.sev.toFixed(1)} &times; ${d.gap.toFixed(3)}) &times; (1 + ${d.media.toFixed(3)} &times; 0.2)<br>
        <span style="color:var(--text-secondary)">=</span> <span style="color:${valToColor(d.oci)};font-weight:700">${d.oci.toFixed(4)}</span> <span style="color:var(--text-secondary)">(normalized)</span>
      </div>
    </div>
  `;

  panel.classList.add('open');

  // Render charts
  renderFundingChart(iso);
  renderOCITrendChart(iso);
}

function renderFundingChart(iso) {
  const history = getCountryHistory(iso);
  const ctx = document.getElementById('funding-chart');
  if (!ctx) return;
  if (fundingChart) fundingChart.destroy();

  fundingChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: history.map(d => d.year),
      datasets: [
        { label: 'Funded', data: history.map(d => d.fund), backgroundColor: 'rgba(34,197,94,0.7)', borderRadius: 4 },
        { label: 'Gap', data: history.map(d => d.req - d.fund), backgroundColor: 'rgba(255,68,102,0.4)', borderRadius: 4 }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { labels: { color: '#8a8a9a', font: { size: 10 } } } },
      scales: {
        x: { stacked: true, ticks: { color: '#8a8a9a', font: { size: 10 } }, grid: { display: false } },
        y: { stacked: true, ticks: { color: '#8a8a9a', font: { size: 10 }, callback: v => '$'+v+'M' }, grid: { color: 'rgba(255,255,255,0.04)' } }
      }
    }
  });
}

function renderOCITrendChart(iso) {
  const history = getCountryHistory(iso);
  const ctx = document.getElementById('oci-trend-chart');
  if (!ctx) return;
  if (decompChart) decompChart.destroy();

  decompChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: history.map(d => d.year),
      datasets: [{
        label: 'OCI Score',
        data: history.map(d => d.oci),
        borderColor: '#ff4466',
        backgroundColor: 'rgba(255,68,102,0.1)',
        fill: true,
        tension: 0.3,
        pointBackgroundColor: '#ff4466',
        pointRadius: 5,
        pointHoverRadius: 7,
        borderWidth: 2
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { color: '#8a8a9a', font: { size: 10 } }, grid: { display: false } },
        y: { min: 0, max: 1.05, ticks: { color: '#8a8a9a', font: { size: 10 } }, grid: { color: 'rgba(255,255,255,0.04)' } }
      }
    }
  });
}

// ═══════════════════════════════════════════════════════════════
// BOTTOM STATS
// ═══════════════════════════════════════════════════════════════
function updateStats() {
  const data = getYearData(selectedYear);
  const totalPIN = data.reduce((s,d) => s + d.pin_k, 0);
  const avgGap = data.reduce((s,d) => s + d.gap, 0) / data.length;
  const totalReq = data.reduce((s,d) => s + d.req, 0);
  const totalFund = data.reduce((s,d) => s + d.fund, 0);
  const highNeglect = data.filter(d => d.media > 0.7).length;

  document.getElementById('stats-bar').innerHTML = `
    <div class="stat"><div class="stat-val">${data.length}</div><div class="stat-label">Crises Tracked</div></div>
    <div class="stat"><div class="stat-val" style="color:var(--accent-yellow)">${fmtK(totalPIN)}</div><div class="stat-label">People in Need</div></div>
    <div class="stat"><div class="stat-val" style="color:var(--accent-red)">${fmtPct(avgGap)}</div><div class="stat-label">Avg Funding Gap</div></div>
    <div class="stat"><div class="stat-val" style="color:var(--accent-green)">$${fmtM(totalFund)}</div><div class="stat-label">Total Funded</div></div>
    <div class="stat"><div class="stat-val" style="color:var(--accent-orange)">$${fmtM(totalReq - totalFund)}</div><div class="stat-label">Total Shortfall</div></div>
    <div class="stat"><div class="stat-val" style="color:var(--accent-purple)">${highNeglect}</div><div class="stat-label">Low Visibility</div></div>
  `;
}

// ═══════════════════════════════════════════════════════════════
// EVENT HANDLERS
// ═══════════════════════════════════════════════════════════════

// Year buttons
document.querySelectorAll('.ctrl-btn[data-year]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.ctrl-btn[data-year]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedYear = parseInt(btn.dataset.year);
    selectedCountry = null;
    document.getElementById('detail-panel').classList.remove('open');
    map.setFilter('crisis-selected', ['==', 'iso_3166_1_alpha_3', '']);
    updateMap();
    renderSidebar();
    updateStats();
  });
});

// Layer buttons
document.querySelectorAll('.layer-btn[data-layer]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.layer-btn[data-layer]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedLayer = btn.dataset.layer;
    updateMap();
    renderSidebar();
  });
});

// Close detail panel
document.getElementById('close-detail').addEventListener('click', () => {
  document.getElementById('detail-panel').classList.remove('open');
  selectedCountry = null;
  map.setFilter('crisis-selected', ['==', 'iso_3166_1_alpha_3', '']);
  document.querySelectorAll('.crisis-item').forEach(el => el.classList.remove('selected'));
});
</script>
</body>
</html>
